<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraSpatial Command Center</title>

    <!-- maplibre gl -->
    <link href="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.js"></script>

    <!-- deck.gl standalone -->
    <script src="https://unpkg.com/deck.gl@8.9.0/dist.min.js"></script>

    <style>
        :root {
            --cyber-blue: #00f3ff;
            --cyber-dark: #090a0f;
            --panel-bg: rgba(9, 10, 15, 0.85);
            --border-glow: #00f3ff80;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--cyber-dark);
            color: #fff;
            overflow: hidden;
        }

        #map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        /* Cyberpunk UI Sidebar */
        #sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 400px;
            max-height: calc(100vh - 40px);
            background: var(--panel-bg);
            border: 1px solid var(--cyber-blue);
            box-shadow: 0 0 15px var(--border-glow);
            backdrop-filter: blur(10px);
            padding: 20px;
            overflow-y: auto;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            color: var(--cyber-blue);
            margin: 0 0 10px 0;
            font-size: 1.15rem;
            /* Scaled down slightly to fit purely on one line */
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--cyber-blue);
            padding-bottom: 10px;
            white-space: nowrap;
            /* Forces one line constraint */
        }

        h3 {
            color: #ccc;
            margin: -5px 0 15px 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid var(--cyber-blue);
            padding-bottom: 10px;
            font-weight: 500;
        }

        .section {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-left: 3px solid var(--cyber-blue);
            border-radius: 0 4px 4px 0;
        }

        .section-title {
            font-size: 0.9rem;
            color: #aaaaaa;
            /* Better contrast for accessibility */
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .agent-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #e0e0e0;
        }

        .directive-box {
            background: rgba(0, 243, 255, 0.1);
            border-left: 4px solid var(--cyber-blue);
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 2px;
        }

        .command-header {
            font-size: 0.75rem;
            color: var(--cyber-blue);
            letter-spacing: 1.5px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .directive-text {
            color: #fff;
            font-weight: 600;
            font-size: 1.05rem;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        .tactical-header {
            font-size: 0.7rem;
            color: #888;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .tactical-text {
            color: #ccc;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .highlight {
            color: var(--cyber-blue);
            font-weight: bold;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: var(--cyber-blue);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px var(--cyber-blue);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 243, 255, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(0, 243, 255, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 243, 255, 0);
            }
        }

        /* Scanline effect */
        #sidebar::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <main id="map-container" aria-label="Interactive 3D Stadium Map visualizing crowd flow" role="application"></main>

    <aside id="sidebar" aria-label="Command Center Feedback Panel">
        <header>
            <h1>AuraSpatial</h1>
            <h3>Command & Control Center</h3>
            <div style="display: flex; align-items: center; margin-bottom: 10px;" aria-hidden="true">
                <div class="status-dot"></div>
                <span style="font-size: 0.8rem; letter-spacing: 1px;">AGENT CONNECTION: LIVE</span>
            </div>
        </header>

        <section class="section" aria-labelledby="action-log-title">
            <h2 id="action-log-title" class="section-title">Operations Incident Commander Action Log</h2>
            <!-- Screen readers will smoothly announce updates dumped into this div -->
            <div id="agent-reasoning" class="agent-text" role="status" aria-live="polite">Initializing spatial sync...
            </div>
        </section>

        <section class="section" aria-labelledby="raw-context-title">
            <h2 id="raw-context-title" class="section-title">Raw Context Sync</h2>
            <pre id="raw-context"
                style="font-size: 0.75rem; color: #aaa; max-height: 150px; overflow: hidden; margin: 0;"
                aria-live="off"></pre>
        </section>
    </aside>

    <script>
        const { DeckGL, ScatterplotLayer, TextLayer, ArcLayer } = deck;

        const deckgl = new DeckGL({
            container: 'map-container',
            mapStyle: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            initialViewState: {
                longitude: 77.599861,
                latitude: 12.980111,
                zoom: 17,
                pitch: 45,
                bearing: 0
            },
            controller: true
        });

        async function fetchSystemState() {
            try {
                // Fetch the unified payload from our Flask Python API
                const response = await fetch('/api/stadium_state');
                const data = await response.json();

                if (data.error) {
                    document.getElementById('agent-reasoning').innerText = "ERROR: " + data.error;
                    return;
                }

                // Parse the native Gemini tags using Regex payload stripping
                let rawText = data.agent_reasoning || "";

                let inputMatch = rawText.match(/\[INPUT\]([\s\S]*?)\[REASONING\]/i);
                let reasoningMatch = rawText.match(/\[REASONING\]([\s\S]*?)\[ACTION\]/i);
                let actionMatch = rawText.match(/\[ACTION\]([\s\S]*)/i);

                let sensorData = inputMatch ? inputMatch[1].trim() : "Syncing telemetry...";
                let tactReasoning = reasoningMatch ? reasoningMatch[1].trim() : "Awaiting strategy vectors.";
                let fieldDirective = actionMatch ? actionMatch[1].trim() : rawText;

                // Mini Markdown to HTML converter
                function formatMarkdown(text) {
                    // Convert **bold** to <strong>bold</strong>
                    let html = text.replace(/\*\*(.*?)\*\*/g, '<strong style="color: #00f3ff;">$1</strong>');
                    // Add distinct line breaks before numbered list items mapping
                    html = html.replace(/(\d+\.\s\*\*)/g, '<br><br>$1');
                    // Strip leading break if it hits the top
                    if (html.startsWith('<br><br>')) { html = html.substring(8); }
                    return html;
                }

                fieldDirective = formatMarkdown(fieldDirective);
                tactReasoning = formatMarkdown(tactReasoning);

                // Re-build layout with Command Center UX hierarchy (Action First!)
                let uxHTML = `
                    <div class="directive-box">
                        <div class="command-header">>>> ACTIVE FIELD DIRECTIVE</div>
                        <div class="directive-text">${fieldDirective}</div>
                    </div>
                    <div>
                        <div class="tactical-header">> TACTICAL INTELLIGENCE</div>
                        <div class="tactical-text">${tactReasoning}</div>
                    </div>
                    <div>
                        <div class="tactical-header">> SENSOR TELEMETRY LOGS</div>
                        <div class="tactical-text">${sensorData}</div>
                    </div>
                `;

                document.getElementById('agent-reasoning').innerHTML = uxHTML;
                document.getElementById('raw-context').innerText = JSON.stringify(data.spatial, null, 2);

                // Reformat cluster geometries for Deck.gl
                const clusters = data.spatial.hotspot_clusters || [];
                const parsedData = clusters.map(c => {
                    return {
                        position: c.geometry.coordinates,
                        radius: c.fan_count * 2, // scale visually
                        count: c.fan_count
                    };
                });

                // Reformat Gates for Deck.gl
                const gatePoints = data.spatial.gates || [];
                let gateData = [];

                for (let g of gatePoints) {
                    if (g.lon && g.lat) {
                        gateData.push({
                            name: `${g.gate_name} (${g.occupancy_percentage}%)`,
                            position: [g.lon, g.lat],
                            safe: g.occupancy_percentage < 80
                        });
                    }
                }

                // Layers
                const layerClusters = new ScatterplotLayer({
                    id: 'hotspot-layer',
                    data: parsedData,
                    pickable: true,
                    opacity: 0.8,
                    stroked: true,
                    filled: true,
                    radiusMinPixels: 10,
                    radiusMaxPixels: 100,
                    lineWidthMinPixels: 2,
                    getPosition: d => d.position,
                    getRadius: d => d.radius,
                    getFillColor: [0, 243, 255, 140], // Cyberpunk Blue
                    getLineColor: [255, 255, 255]
                });

                const layerGates = new ScatterplotLayer({
                    id: 'gate-layer',
                    data: gateData,
                    pickable: true,
                    opacity: 1,
                    stroked: false,
                    filled: true,
                    radiusMinPixels: 8,
                    getPosition: d => d.position,
                    getFillColor: d => d.safe ? [0, 255, 100] : [255, 50, 50]
                });

                const layerGateText = new TextLayer({
                    id: 'gate-text',
                    data: gateData,
                    getPosition: d => d.position,
                    getText: d => d.name,
                    getSize: 16,
                    getColor: [255, 255, 255],
                    getPixelOffset: [0, -20],
                    fontFamily: 'Inter'
                });

                // Compute Arcs wrapping clusters to their nearest gate to visualize physical crowd flow
                const arcData = [];
                for (let c of parsedData) {
                    let nearestGate = null;
                    let minDistance = Infinity;

                    for (let g of gatePoints) {
                        if (g.lon && g.lat) {
                            let dist = Math.sqrt(Math.pow(c.position[0] - g.lon, 2) + Math.pow(c.position[1] - g.lat, 2));
                            if (dist < minDistance) {
                                minDistance = dist;
                                nearestGate = [g.lon, g.lat];
                            }
                        }
                    }

                    // Only draw an arc if they are still moving towards it (not already standing exactly on it)
                    if (nearestGate && minDistance > 0.00015) {
                        arcData.push({
                            source: c.position,
                            target: nearestGate,
                            count: c.count
                        });
                    }
                }

                const layerArcs = new ArcLayer({
                    id: 'arc-layer',
                    data: arcData,
                    getSourcePosition: d => d.source,
                    getTargetPosition: d => d.target,
                    getSourceColor: [0, 243, 255, 180], // Cyberblue
                    getTargetColor: [0, 255, 100, 255], // Safe Green
                    getWidth: d => Math.max(3, d.count / 5), // Dynamic thickness
                    pickable: false
                });

                deckgl.setProps({
                    layers: [layerClusters, layerGates, layerGateText, layerArcs]
                });

            } catch (e) {
                console.error("Polling error:", e);
                document.getElementById('agent-reasoning').innerText = "Lost connection to Brain Server... Reconnecting.";
            }
        }

        // Poll every 120 seconds (strictly conserves API usage limits and slashes costs)
        setInterval(fetchSystemState, 1200000);
        // Initial Fetch
        fetchSystemState();

    </script>
</body>

</html>
